<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Educational Background of Winnie Madikizella">
  <meta name="keywords" content="Education, Certifications, Winnie Madikizella">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Education | Winnie Madikizella</title>
  <link rel="stylesheet" href="styles/style.css">
  <style>
    /* ===== Page Styles ===== */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fdfdfd;
      color: #333;
    }

    header {
      background: #0d253f;
      color: #fff;
      padding: 1rem 2rem;
    }

    header nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }

    .logo {
      font-weight: bold;
      font-size: 1.5rem;
    }

    header ul {
      list-style: none;
      display: flex;
      gap: 1rem;
    }

    header a {
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
    }

    header a.active {
      text-decoration: underline;
    }

    /* ===== Content Section ===== */
    .content {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 2rem;
      text-align: center;
    }

    .content h1 {
      font-size: 3rem; /* bigger font */
      color: #0097b2;
      margin-bottom: 2rem;
    }

    .content h2 {
      font-size: 2rem;
      color: #0d253f;
      margin-bottom: 0.5rem;
    }

    .content p,
    .content li {
      font-size: 1.3rem; /* bigger font */
      line-height: 1.8;
      margin-bottom: 1rem;
    }

    .education-list {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .education-item ul {
      list-style: disc;
      margin-left: 1.5rem;
    }

    /* ===== Footer ===== */
    footer {
      text-align: center;
      background: #0d253f;
      color: #fff;
      padding: 1.5rem 2rem;
      margin-top: 3rem;
      font-size: 1rem;
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      header nav {
        flex-direction: column;
        align-items: flex-start;
      }

      header ul {
        flex-direction: column;
        gap: 0.5rem;
        margin-top: 1rem;
      }

      .content h1 {
        font-size: 2.5rem;
      }

      .content h2 {
        font-size: 1.8rem;
      }

      .content p,
      .content li {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>
  <!-- ===== HEADER ===== -->
  <header>
    <nav>
      <a href="index.html" class="logo">Winnie Madikizella</a>
      <ul>
        <li><a href="about.html">About</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
        <li><a href="education.html" class="active">Education</a></li>
        <li><a href="interests.html">Interests</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- ===== EDUCATION SECTION ===== -->
  <section class="content">
    <h1>Education</h1>
    <div class="education-list">
      <div class="education-item">
        <h2>Bachelor’s Degree in Economics & Statistics</h2>
        <p>University of Nairobi</p>
      </div>
      <div class="education-item">
        <h2>Certifications</h2>
        <ul>
          <p>AWS re/Start Graduate – Cloud Fundamentals</p>
        </ul>
      </div>
    </div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer>
    <p>&copy; 2025 Winnie Madikizella. All Rights Reserved.</p>
  </footer>
</body>
</html>
